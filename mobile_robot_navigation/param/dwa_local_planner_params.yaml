DWAPlannerROS:
  # -------------------------
  # Robot Configuration Parameters
  # -------------------------
  max_vel_x: 7.0          # Maximum forward linear velocity (m/s)
  min_vel_x: -3.0         # Maximum backward linear velocity (m/s)

  max_vel_y: 0.0          # No lateral movement for non-holonomic robot
  min_vel_y: 0.0

  max_vel_trans: 7.0      # Maximum translational velocity (DWA planner)
  min_vel_trans: -3.0     # Allow backward movement (-3 m/s)

  max_vel_theta: 2.5      # Maximum rotational velocity (rad/s)
  min_vel_theta: -2.5     # Allow rotation in both directions

  acc_lim_x: 7.0          # Maximum linear acceleration (m/s²)
  acc_lim_y: 0.0          # No lateral acceleration
  acc_lim_theta: 3.5      # Maximum angular acceleration

  # -------------------------
  # Goal Tolerance
  # -------------------------
  xy_goal_tolerance: 0.1          # Distance tolerance to goal (m)
  yaw_goal_tolerance: 0.05        # Angular tolerance to goal (rad)
  latch_xy_goal_tolerance: false  # Do not latch the goal tolerance

  # -------------------------
  # Forward Simulation
  # -------------------------
  sim_time: 0.8               # Duration of DWA forward simulation (s)
  vx_samples: 20              # Linear velocity samples in x
  vy_samples: 0               # Lateral velocity samples (0 for non-holonomic)
  vth_samples: 40             # Angular velocity samples
  controller_frequency: 15.0  # Controller loop frequency (Hz)

  # -------------------------
  # Trajectory Scoring
  # -------------------------
  path_distance_bias: 30.0       # Weight for distance from global path
  goal_distance_bias: 10.0       # Weight for distance to goal (lower = move faster)
  occdist_scale: 0.02            # Weight for obstacle distance
  forward_point_distance: 0.325  # Distance for forward point evaluation

  stop_time_buffer: 0.0          # No additional buffer for stopping → allows faster motion
  scaling_speed: 0.25            # Speed scaling factor (when near obstacles)
  max_scaling_factor: 1.0        # Maximum allowed scaling (1 = full speed even near obstacles)

  # -------------------------
  # Oscillation Prevention
  # -------------------------
  oscillation_reset_dist: 0.05 # Distance threshold to reset oscillation flag

  # -------------------------
  # Debugging
  # -------------------------
  publish_traj_pc: true        # Publish trajectory point cloud for debugging
  publish_cost_grid_pc: true   # Publish cost grid for visualization
